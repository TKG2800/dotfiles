# Don't print a new line at the start of the prompt
# add_newline = false

format = """
[в•ӯв”Җaccountsв”Җ>](bold blue) $username$gcloud$aws$kubernetes
[в”Јв”Җnetworkв”Җв”Җ>](bold yellow) $localip
[в”Јв”Җsystemв”Җв”Җв”Җ>](green) $time$status$cmd_duration$hostname$memory_usage$jobs$battery
[в”Јв”Җprojectв”Җв”Җ>](bold red) $directory$rust$package$golang$terraform $docker_context
[в”Јв”Җgitв”Җв”Җв”Җв”Җв”Җв”Җ>](bold blue)$git_branch$git_status$git_commit
[в”Јв”Җmetricsв”Җв”Җ>](bold red)$git_metrics
[в•°в”Җcliв”Җв”Җв”Җв”Җв”Җв”Җ](bold green)$character
"""

command_timeout = 500


# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[РҘ](bold red)"


[cmd_duration]
show_milliseconds = true
# format = "took [$duration](bold yellow) "

[kubernetes]
format = 'on [вӣө $context \(ns:$namespace\)](purple)'
disabled = false
# [kubernetes.context_aliases]
# "dev.local.cluster.k8s" = "dev"

[memory_usage]
format = "with$symbol [${ram} ${ram_pct}( | ${swap} ${swap_pct})]($style) "
disabled = false
threshold = -1
symbol = " "
style = "bold dimmed green"

[gcloud]
style = "blue"
format = '[$symbol$account(\($project\))]($style) '
symbol = "пёҸGв…Ғ:вҳҒпёҸ"
[gcloud.region_aliases]
us-central1 = "uc1"
asia-northeast1 = "an1"

[aws]
format = '[$symbol$profile(\($region\))]($style) '
style = "bold yellow"
symbol = "вҲҖвҚөвӮ·вҳҒпёҸвҳҒпёҸ"
[aws.region_aliases]
ap-southeast-2 = "au"
us-east-1 = "va"

[package]
format = " package: [рҹҺҒ $version](208 bold) "

[docker_context]
format = "via [рҹҗӢ $context](blue bold)"
disabled = false
only_with_files = true
detect_folders = []

[directory]
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol="~ $HOME"

[username]
style_user = "blue bold"
style_root = "bold red"
format = "user: [$user]($style) "
disabled = false
show_always = true

[time]
disabled = false
format = 'рҹ•ҷ -> [\[ $time \]]($style) '

[hostname]
ssh_only = false
format = 'on [$hostname](bold red) '
trim_at = "."
disabled = false

[status]
style = "red"
symbol = "рҹҡ«"
success_symbol = "рҹҹў SUCCESS"
not_executable_symbol="рҹҡ«"
not_found_symbol="рҹ”Қ"
format = '[\[$symbol$status\]]($style) '
disabled = false

[git_commit]
commit_hash_length = 4
tag_symbol = "x "
format = "[\\($hash$tag\\)]($style) "
style = "bold green"

[git_branch]
format = "on branch [$symbol$branch(:$remote_branch)]($style) "
style = "bold green"
symbol = "оӮ  "

[git_status]
ahead = "вҮЎрҹҸҺрҹ’Ё${count}"
diverged = "вҮ•вҮЎрҹҳө${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈрҹҳ°${count}"
conflicted = "рҹҸі"
untracked = "рҹӨ·вҖҚ"
stashed = "рҹ“Ұ"
modified = "рҹ“қ"
staged = '[++\($count\)](green)'
renamed = "рҹ‘…"
deleted = "рҹ—‘"

[git_metrics]
added_style = "bold blue"
disabled = false
deleted_style = "bold red"
format = '([ Added: +$added]($added_style))([ Deleted: -$deleted]($deleted_style) )'

[rust]
format = "rust: [рҹҰҖ $version](red bold)"

[golang]
format = "go: [рҹҸҺрҹ’Ё $version](bold cyan) "

[helm]
format = "helm: [вҺҲ $version](bold white) "

[jobs]
symbol = "+ "
threshold = 4
format = "background [$symbol$number]($style) "

[terraform]
format = "[рҹҸҺрҹ’Ё $version$workspace]($style) "

[battery]
full_symbol = "рҹ”Ӣ"
charging_symbol = "вҡЎпёҸ"
discharging_symbol = "рҹ’Җ"

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 10
style = "bold red"

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 30
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

[localip]
ssh_only = false
format = "@[$localipv4](purple) "
disabled = false
