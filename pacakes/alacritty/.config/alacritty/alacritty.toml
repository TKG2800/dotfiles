# import = [ "~/dotfile/pacakes/alacritty/.config/alacritty/tokyo-night.toml" ]
import = [
  # uncomment the flavour you want below:
  # "~/.config/alacritty/catppuccin-latte.toml"
  # "~/.config/alacritty/catppuccin-frappe.toml"
  # "~/.config/alacritty/catppuccin-macchiato.toml"
  "~/.config/alacritty/catppuccin-mocha.toml"
]
live_config_reload = true
[env]
 TERM = "xterm-256color"
 [shell]
#  program = "/bin/bash"
   program = "/bin/zsh"
   args = ["-l", "-c", "tmux a -t 0 || tmux -u"]
[window]
opacity = 0.75
startup_mode = "SimpleFullscreen"
[window.dimensions]
  columns = 200
  lines = 60
[window.padding]
  x = 8
  y = 4
[cursor]
  unfocused_hollow = true
  blink_interval = 400
[cursor.style]
  shape = "Beam"
  blinking = "Always"
[scrolling]
  history = 10000
[font]
size = 14
[font.normal]
family = "CartographCF Nerd Font"
style = "Italic"
