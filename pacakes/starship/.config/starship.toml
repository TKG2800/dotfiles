# ~/.config/starship.toml
format = """
[Ôò¡ÔöÇuserÔöÇÔöÇÔöÇÔØ»](bold blue) $userna$mememory_usage$battery$time
[ÔöúÔöÇsystemÔöÇÔØ»](bold yellow)$hostname$cmd_duration$time
[ÔöúÔöÇprojectÔØ»](bold red) $directory$git_branch$git_states$git_status
[Ôò░ÔöÇcmdÔöÇÔöÇÔöÇÔöÇÔØ»](bold green)$package$golang$terraform$docker_context$python$docker_context$nodejs$rust
"""
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "ÔØ»" symbol in the prompt with "ÔŞ£"
[character] # The name of the module we are configuring is "character"
success_symbol = "[ÔŞ£](bold green)" # The "success_symbol" segment is being set to "ÔŞ£" with the color "bold green"
error_symbol = "[Ô£ù](bold red)"

# ¾░ÇÀ ¯èŞ
# configure directory
[directory]
read_only = " ´á¢"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
# style = "bold italic blue"

[time]
format = '¯Äè[\[ $time \]]($style) '
time_format = '%T'
utc_time_offset = '-9'

[cmd_duration]
min_time = 4
format = '[\($duration\)]($style)'
show_milliseconds = true
disabled = false
style = 'bold yellow'

[aws]
symbol = "¯î¢  "

[conda]
symbol = "´äî "

[dart]
symbol = "¯Şİ "

[docker_context]
symbol = "´îê "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "¯ëÁ "

[elm]
symbol = "¯İ¼ "

[git_branch]
symbol = "´Éİ "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)"
modified = "[${count}+](yellow)"
deleted = "[${count}-](red)"
conflicted = "[${count}~](red)"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
untracked = "[${count}?](blue)"
staged = "[${count}+](green)"

[git_state]
style = "bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"

[golang]
symbol = "¯İğ "

[hg_branch]
symbol = "´Éİ "

[java]
symbol = "¯ëû "

[julia]
symbol = "¯İñ "

[haskell]
symbol = "╬╗ "

[memory_usage]
symbol = "¾░ıø "

[nim]
symbol = "¯ÖÀ "

[nix_shell]
symbol = "´ï£ "

[package]
symbol = "´úû "

[perl]
symbol = "¯Ø® "

[php]
symbol = "¯İê "

[python]
symbol = "¯İå "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "¯ê¥ "

[rust]
symbol = "¯Ş¿ "

[scala]
